version: '3.9'

services:
  deepstream:
    build:
      context: .
      dockerfile: Dockerfile
    image: deepstream_app:8.0
    ipc: host
    privileged: true
    container_name: deepstream_app-8.0
    networks:
      - deepstream_network
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,video,utility,graphics
    env_file:
      - .env
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ./server:/deepstream_app
      - ./sockets:/run/nvunixfd
    working_dir: /deepstream_app
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    stdin_open: true
    tty: true
    ports:
      - "8554:8554"
      - "5000:5000"
      - "8888:8888"
      - "7000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/ready"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 1200s   # 20 min — covers TensorRT engine build time

  ds_client:
    image: ilkaybrahim/deepstream_app:8.0
    depends_on:
      deepstream:
        condition: service_healthy
    ipc: host
    privileged: true
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,video,utility,graphics
      - USE_NEW_NVSTREAMMUX=${USE_NEW_NVSTREAMMUX}
    volumes:
      - ./sockets:/run/nvunixfd   
      - ./client:/client
    working_dir: /client
    networks:
      - deepstream_network
    ports:
      - "8557:8554"
networks:
  deepstream_network:
    driver: bridge
